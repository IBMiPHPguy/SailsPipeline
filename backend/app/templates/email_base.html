<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="x-apple-disable-message-reformatting" />
    <meta name="format-detection" content="telephone=no,address=no,email=no,date=no,url=no" />
    <title>{{ page_title }}</title>
    <!--[if mso]>
      <noscript>
        <xml>
          <o:OfficeDocumentSettings>
            <o:PixelsPerInch>96</o:PixelsPerInch>
          </o:OfficeDocumentSettings>
        </xml>
      </noscript>
    <![endif]-->
    <style type="text/css">
      body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
      table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
      img { -ms-interpolation-mode: bicubic; border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
      table { border-collapse: collapse !important; }
      body { margin: 0 !important; padding: 0 !important; width: 100% !important; height: 100% !important; }
      a[x-apple-data-detectors] { color: inherit !important; text-decoration: none !important; font-size: inherit !important; font-family: inherit !important; font-weight: inherit !important; line-height: inherit !important; }
      @media only screen and (max-width: 620px) {
        .email-container { width: 100% !important; max-width: 100% !important; }
        .email-body-cell { padding: 24px 20px !important; }
        .email-header-cell { padding: 24px 20px 16px !important; }
        .email-footer-cell { padding: 16px 20px 24px !important; }
      }
    </style>
  </head>
  <body style="margin:0;padding:0;background-color:#eef2f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
    <div style="display:none;font-size:1px;line-height:1px;max-height:0;max-width:0;opacity:0;overflow:hidden;mso-hide:all;">
      {{ preview_text }}
    </div>
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:#eef2f7;padding:32px 16px;">
      <tr>
        <td align="center" style="padding:0;">
          <table role="presentation" class="email-container" width="100%" cellspacing="0" cellpadding="0" border="0" style="max-width:600px;width:100%;background-color:#ffffff;border-radius:12px;overflow:hidden;border:1px solid #d9e2ec;box-shadow:0 8px 24px rgba(16,42,67,0.08);">
            <tr>
              <td style="padding:0;">
                {{ agency_header }}
              </td>
            </tr>
            <tr>
              <td class="email-body-cell" style="padding:32px;background-color:#ffffff;">
                <div style="font-size:16px;line-height:1.65;color:#243b53;word-break:break-word;overflow-wrap:anywhere;">
                  {{ content }}
                  {{ email_signature }}
                </div>
              </td>
            </tr>
            <tr>
              <td class="email-footer-cell" style="padding:20px 32px 28px;background-color:#f8fafc;border-top:1px solid #d9e2ec;">
                {{ platform_footer }}
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
