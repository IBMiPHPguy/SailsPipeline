services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE}
      APP_ENV: development
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES}
      SEED_ADMIN_USERNAME: ${SEED_ADMIN_USERNAME}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
      SEED_BRIDGE_ADMIN_USERNAME: ${SEED_BRIDGE_ADMIN_USERNAME:-}
      SEED_BRIDGE_ADMIN_EMAIL: ${SEED_BRIDGE_ADMIN_EMAIL:-}
      SEED_BRIDGE_ADMIN_PASSWORD: ${SEED_BRIDGE_ADMIN_PASSWORD:-}
      ATTACHMENTS_DIR: /app/uploads
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash-lite}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-notifications@sailspipeline.com}
      PUBLIC_APP_BASE_URL: ${PUBLIC_APP_BASE_URL:-http://localhost:8080}
      CC_AUTH_PORTAL_BASE_URL: ${CC_AUTH_PORTAL_BASE_URL:-http://localhost:8080/cc-auth}
      TERMS_PORTAL_BASE_URL: ${TERMS_PORTAL_BASE_URL:-http://localhost:8080/accept-terms}
      INSURANCE_PORTAL_BASE_URL: ${INSURANCE_PORTAL_BASE_URL:-http://localhost:8080/insurance-auth}
      CC_AUTH_ENCRYPTION_KEY: ${CC_AUTH_ENCRYPTION_KEY:-}
      CC_AUTH_VAULT_ACCESS_KEY: ${CC_AUTH_VAULT_ACCESS_KEY:-dev-vault-access-change-me}
    ports:
      - "${BACKEND_PORT}:8000"
    volumes:
      - ./backend:/app
      - attachment_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: /api
    ports:
      - "${FRONTEND_PORT}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

  test-db:
    profiles: ["test"]
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: testroot
      MYSQL_DATABASE: sailspipeline_test
    tmpfs:
      - /var/lib/mysql
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-ptestroot"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  backend-test:
    profiles: ["test"]
    build:
      context: ./backend
    environment:
      DATABASE_URL: mysql+pymysql://root:testroot@test-db:3306/sailspipeline_test
      APP_ENV: test
      JWT_SECRET: test-jwt-secret
      SEED_ADMIN_USERNAME: ""
      SEED_ADMIN_PASSWORD: ""
      ATTACHMENTS_DIR: /tmp/sailspipeline-test-uploads
      GEMINI_API_KEY: ""
    volumes:
      - ./backend:/app
      - ./db:/db:ro
    depends_on:
      test-db:
        condition: service_healthy
    entrypoint:
      - sh
      - -c
      - pip install --no-cache-dir -r requirements.txt -r requirements-dev.txt && exec "$@"
      - --
    command: ["pytest", "tests/", "-v", "--cov=app", "--cov-report=term-missing"]

  bridge-launch:
    profiles: ["launch"]
    build:
      context: ./backend
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE}
      APP_ENV: ${APP_ENV:-production}
      JWT_SECRET: ${JWT_SECRET}
      SEED_BRIDGE_ADMIN_USERNAME: ${SEED_BRIDGE_ADMIN_USERNAME:-}
      SEED_BRIDGE_ADMIN_EMAIL: ${SEED_BRIDGE_ADMIN_EMAIL:-}
      SEED_BRIDGE_ADMIN_PASSWORD: ${SEED_BRIDGE_ADMIN_PASSWORD:-}
      ALLOW_PUBLIC_REGISTRATION: ${ALLOW_PUBLIC_REGISTRATION:-false}
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    restart: "no"
    command: ["python", "scripts/bridge_launch.py"]

  frontend-test:
    profiles: ["test"]
    build:
      context: ./frontend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run test:run"

volumes:
  mysql_data:
  frontend_node_modules:
  attachment_uploads:
