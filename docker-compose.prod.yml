# Production overlay. Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Before first run:
#   1. Set strong JWT_SECRET and CORS_ORIGINS in .env
#   2. Place TLS certs in nginx/certs/fullchain.pem and nginx/certs/privkey.pem

services:
  db:
    ports: !reset []

  backend:
    ports: !reset []
    environment:
      APP_ENV: production
      ALLOW_PUBLIC_REGISTRATION: "false"
      EXPOSE_OPENAPI: "false"
      CORS_ORIGINS: ${CORS_ORIGINS:-https://sailspipeline.com,https://app.sailspipeline.com}
      MAILGUN_API_KEY: ${MAILGUN_API_KEY}
      MAILGUN_DOMAIN: ${MAILGUN_DOMAIN:-mail.sailspipeline.com}
      PUBLIC_APP_BASE_URL: ${PUBLIC_APP_BASE_URL:-https://app.sailspipeline.com}
      BRAND_ASSET_PUBLIC_BASE_URL: ${BRAND_ASSET_PUBLIC_BASE_URL:-https://app.sailspipeline.com}

  frontend:
    ports: !reset []

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro